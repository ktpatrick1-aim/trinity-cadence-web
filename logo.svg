<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <style>
      .petal { fill: #7C3AED; stroke: #7C3AED; stroke-width: 1; stroke-linejoin: round; }
      .overlay { fill: #A78BFA; opacity: 0.35; }
      .cadence-line { stroke: #7C3AED; stroke-width: 4; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Cadence rhythm lines -->
  <line class="cadence-line" x1="8" y1="105" x2="52" y2="105"/>
  <line class="cadence-line" x1="148" y1="105" x2="192" y2="105"/>

  <!-- PETAL 1: Top (points upward) -->
  <path class="petal" d="
    M 100 15
    C 120 15, 140 45, 140 75
    C 140 95, 125 110, 100 125
    C 75 110, 60 95, 60 75
    C 60 45, 80 15, 100 15Z
  "/>

  <!-- PETAL 2: Bottom-left (points to lower-left) -->
  <path class="petal" d="
    M 42 155
    C 30 140, 30 110, 45 85
    C 55 68, 72 60, 92 58
    C 85 80, 82 100, 85 115
    C 88 135, 65 165, 42 155Z
  "/>

  <!-- PETAL 3: Bottom-right (points to lower-right) -->
  <path class="petal" d="
    M 158 155
    C 170 140, 170 110, 155 85
    C 145 68, 128 60, 108 58
    C 115 80, 118 100, 115 115
    C 112 135, 135 165, 158 155Z
  "/>

  <!-- Inner triquetra weave - creates the knot crossing effect -->
  <!-- Crossing segment: Petal 1 over Petal 3 (right side) -->
  <path class="petal" d="
    M 115 70
    C 125 55, 130 50, 135 60
    C 130 70, 120 80, 115 85
    C 110 80, 112 72, 115 70Z
  "/>

  <!-- Crossing segment: Petal 2 over Petal 1 (left side) -->
  <path class="petal" d="
    M 85 70
    C 75 55, 70 50, 65 60
    C 70 70, 80 80, 85 85
    C 90 80, 88 72, 85 70Z
  "/>

  <!-- Crossing segment: Petal 3 over Petal 2 (bottom) -->
  <path class="petal" d="
    M 92 125
    C 95 135, 100 145, 100 150
    C 100 145, 105 135, 108 125
    C 105 120, 95 120, 92 125Z
  "/>

  <!-- Bottom diamond/teardrop where lower petals converge -->
  <path class="petal" d="
    M 85 145
    C 90 155, 95 168, 100 180
    C 105 168, 110 155, 115 145
    C 110 150, 105 158, 100 165
    C 95 158, 90 150, 85 145Z
  "/>

  <!-- Semi-transparent overlays at petal intersections -->
  <!-- Center overlap zone -->
  <ellipse class="overlay" cx="100" cy="90" rx="22" ry="25"/>

  <!-- Upper-left intersection -->
  <path class="overlay" d="
    M 75 70 Q 85 55, 95 65 Q 85 80, 75 70Z
  "/>

  <!-- Upper-right intersection -->
  <path class="overlay" d="
    M 125 70 Q 115 55, 105 65 Q 115 80, 125 70Z
  "/>

  <!-- Bottom intersection -->
  <path class="overlay" d="
    M 95 120 Q 100 135, 105 120 Q 100 110, 95 120Z
  "/>
</svg>
